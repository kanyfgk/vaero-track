<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAERO Tracking</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f6f4ee;
    font-family: Arial, sans-serif;
  }

  .card {
    width: 90%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  .brand {
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }

  h1 {
    margin: 0 0 10px;
  }

  p {
    color: #777;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    height: 50px;
    border-radius: 12px;
    border: 1px solid #ddd;
    padding: 0 12px;
    font-size: 14px;
    margin-bottom: 10px;
  }

  button {
    width: 100%;
    height: 50px;
    border: none;
    border-radius: 12px;
    background: #2f3a4a;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.95;
  }

  .loading {
    display: none;
    margin-top: 20px;
    font-size: 14px;
    color: #555;
  }
</style>
</head>

<body>

<div class="card">
  <div class="brand">VAERO</div>
  <h1>Track your shipment</h1>
  <p>Enter your tracking number</p>

  <input id="codeInput" placeholder="Enter tracking number">
  <button onclick="track()">Track</button>

  <div id="loadingText" class="loading">
    Tracking information loading...
  </div>
</div>

<script>
function track() {
  const code = document.getElementById("codeInput").value.trim();
  const loading = document.getElementById("loadingText");

  if (!code) {
    alert("Tracking number required");
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {
    window.location.href = "https://t.17track.net/en#nums=" + encodeURIComponent(code);
  }, 1000);
}
</script>

</body>
</html>
