<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VAERO Takip</title>

<style>
  :root{
    --bg:#f5f3ee;
    --card:#ffffffcc;
    --text:#1f1f1f;
    --muted:#6b6b6b;
    --border:#e3ded4;
    --accent:#2f3a4a;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,Arial,sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, #f5f3ee 60%, #eee9df 100%);
  }

  .card{
    width:100%;
    max-width:440px;
    padding:34px 28px 26px;
    border-radius:22px;
    background:var(--card);
    backdrop-filter: blur(10px);
    border:1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0,0,0,0.06);
    text-align:center;
  }

  .brand{
    font-size:12px;
    letter-spacing:.32em;
    font-weight:700;
    margin-bottom:18px;
  }

  h1{
    margin:0 0 10px;
    font-size:26px;
    font-weight:600;
  }

  p{
    margin:0 auto 18px;
    font-size:14px;
    color:var(--muted);
  }

  .form{
    display:flex;
    gap:10px;
    flex-direction:column;
  }

  input{
    height:52px;
    border-radius:14px;
    border:1px solid var(--border);
    padding:0 14px;
    font-size:14px;
    outline:none;
  }

  button{
    height:52px;
    border:none;
    border-radius:14px;
    background:var(--accent);
    color:#fff;
    font-weight:600;
    cursor:pointer;
  }

  .subtext{
    margin-top:10px;
    font-size:12px;
    color:#9a9a9a;
  }

  .error{
    display:none;
    margin-top:8px;
    font-size:13px;
    color:#8a2d2d;
  }

  /* loading overlay */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(245,243,238,0.75);
    backdrop-filter: blur(8px);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
  }

  .spinner{
    width:28px;
    height:28px;
    border:3px solid #ddd;
    border-top-color:#2f3a4a;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:14px;
  }

  @keyframes spin{
    to{transform:rotate(360deg)}
  }

  .loading-text{
    font-size:14px;
    color:#555;
  }

  @media(min-width:640px){
    .form{flex-direction:row}
    input{flex:1}
    button{width:140px}
  }
</style>
</head>

<body>

<div class="card">
  <div class="brand">VAERO</div>
  <h1>Gönderinizi takip edin</h1>
  <p>Takip numaranızı girin. Durum bilgisine yönlendirileceksiniz.</p>

  <div class="form">
    <input id="input" placeholder="Takip numarası girin">
    <button id="btn">İzle</button>
  </div>

  <div id="error" class="error">Takip numarası giriniz.</div>
  <div class="subtext">VAERO • Personal Atmosphere System</div>
</div>

<div id="overlay" class="overlay">
  <div class="spinner"></div>
  <div class="loading-text">VAERO is connecting to carrier...</div>
</div>

<script>
// ================= SUPABASE =================
const SUPABASE_URL = "https://wpfiszzxlwkmaqcqmywa.supabase.co/rest/v1";
const SUPABASE_KEY = "sb_publishable_eTspasegbb8PbX2hEGMD5w_ggrWRuYN";

function trackEvent(name, meta = {}) {
  fetch(SUPABASE_URL + "/events", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({
      event_name: name,
      page: window.location.pathname,
      meta: meta
    }),
    keepalive: true
  }).catch(()=>{}); // hata olsa bile redirect'i bozmaz
}

// ================= CUSTOMER SIGNALS =================
trackEvent("page_view", {
  referrer: document.referrer,
  device: navigator.userAgent
});

let typed = false;
document.getElementById("input").addEventListener("focus", ()=>{
  trackEvent("input_focus");
});

document.getElementById("input").addEventListener("input", ()=>{
  if(!typed){
    trackEvent("input_started");
    typed = true;
  }
});

setTimeout(()=> trackEvent("time_30s"), 30000);

// ================= MAIN =================
const input = document.getElementById("input");
const btn = document.getElementById("btn");
const overlay = document.getElementById("overlay");
const error = document.getElementById("error");

function go(){
  const code = input.value.trim();

  if(!code){
    error.style.display = "block";
    return;
  }

  error.style.display = "none";
  overlay.style.display = "flex";

  trackEvent("tracking_submit", { code: code });

  setTimeout(()=>{
    window.location.href =
      "https://t.17track.net/en#nums=" + encodeURIComponent(code);
  }, 900);
}

btn.addEventListener("click", go);

input.addEventListener("keydown", (e)=>{
  if(e.key==="Enter") go();
});
</script>

</body>
</html>
