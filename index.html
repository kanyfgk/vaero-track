<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAERO Takip</title>

  <style>
    :root{
      --bg:#f5f3ee;
      --card:rgba(255,255,255,0.82);
      --text:#1f1f1f;
      --muted:#6b6b6b;
      --border:#e3ded4;
      --accent:#2f3a4a;
      --accent-hover:#25303e;
      --error:#8a2d2d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, #f5f3ee 60%, #eee9df 100%);
    }

    .card{
      width:100%;
      max-width:460px;
      padding:34px 28px 24px;
      border-radius:24px;
      background:var(--card);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);
      box-shadow:0 20px 40px rgba(0,0,0,0.06);
      text-align:center;
    }

    .brand{
      font-size:12px;
      letter-spacing:.34em;
      font-weight:700;
      margin-bottom:18px;
      color:#2a2a2a;
    }

    h1{
      margin:0 0 10px;
      font-size:26px;
      font-weight:600;
      letter-spacing:-0.01em;
    }

    .desc{
      margin:0 auto 22px;
      max-width:320px;
      font-size:14px;
      line-height:1.6;
      color:var(--muted);
    }

    .form{
      display:flex;
      gap:10px;
      flex-direction:column;
      align-items:stretch;
    }

    input{
      width:100%;
      height:52px;
      border-radius:14px;
      border:1px solid var(--border);
      padding:0 14px;
      font-size:14px;
      outline:none;
      background:#fff;
      transition:border-color .2s, box-shadow .2s;
    }

    input:focus{
      border-color:#bdb7aa;
      box-shadow:0 0 0 4px rgba(47,58,74,0.06);
    }

    button{
      width:100%;
      height:52px;
      border:none;
      border-radius:14px;
      background:var(--accent);
      color:#fff;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:transform .2s, box-shadow .2s, background .2s;
    }

    button:hover{
      background:var(--accent-hover);
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(0,0,0,0.10);
    }

    button:active{
      transform:translateY(0);
    }

    .helper{
      margin-top:12px;
      font-size:12px;
      line-height:1.5;
      color:#9a9a9a;
    }

    .error{
      display:none;
      margin-top:10px;
      font-size:13px;
      color:var(--error);
    }

    .small{
      margin-top:14px;
      font-size:12px;
      color:#9a9a9a;
      letter-spacing:.03em;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(245,243,238,0.76);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:999;
      padding:20px;
      text-align:center;
    }

    .spinner{
      width:30px;
      height:30px;
      border:3px solid rgba(47,58,74,0.15);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
      margin-bottom:14px;
    }

    .loading-title{
      font-size:14px;
      font-weight:600;
      color:#343434;
      margin-bottom:6px;
    }

    .loading-text{
      font-size:13px;
      color:#666;
      letter-spacing:.01em;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    @media(min-width:640px){
      .form{
        flex-direction:row;
      }
      input{
        flex:1;
      }
      button{
        width:140px;
        flex-shrink:0;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">VAERO</div>
    <h1>Gönderinizi takip edin</h1>
    <p class="desc">Takip numaranızı girin. Durum bilgisine yönlendirileceksiniz.</p>

    <div class="form">
      <input id="trackingInput" placeholder="Takip numarası girin" />
      <button id="trackingBtn" type="button">İzle</button>
    </div>

    <div id="errorText" class="error">Takip numarası giriniz.</div>
    <div class="helper">Taşıyıcı bağlantısı açılmadan önce kısa bir kontrol yapılır.</div>
    <div class="small">VAERO • Personal Atmosphere System</div>
  </div>

  <div id="overlay" class="overlay">
    <div class="spinner"></div>
    <div class="loading-title">Tracking information loading...</div>
    <div class="loading-text">VAERO is connecting to carrier...</div>
  </div>

  <script>
    const input = document.getElementById("trackingInput");
    const btn = document.getElementById("trackingBtn");
    const errorText = document.getElementById("errorText");
    const overlay = document.getElementById("overlay");

    function go() {
      const code = input.value.trim();

      if (!code) {
        errorText.style.display = "block";
        return;
      }

      errorText.style.display = "none";
      overlay.style.display = "flex";

      setTimeout(function () {
        window.location.href = "https://t.17track.net/en#nums=" + encodeURIComponent(code);
      }, 900);
    }

    btn.addEventListener("click", go);

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        go();
      }
    });
  </script>

</body>
</html>
